services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: filaminto-backend
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    environment:
      MASTER_DB_URL: postgresql+psycopg2://app_db:AppSecure2024!@db:5432/platform_db
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: filaminto-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  db:
    image: postgres:18
    container_name: filaminto-db
    environment:
      POSTGRES_USER: app_db
      POSTGRES_PASSWORD: AppSecure2024!
      POSTGRES_DB: platform_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_db -d platform_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
