[databases]
; Route both databases through PgBouncer to PostgreSQL
platform_db = host=postgres port=5432 dbname=platform_db
tenants_db  = host=postgres port=5432 dbname=tenants_db

[pgbouncer]
listen_addr          = 0.0.0.0
listen_port          = 5432
auth_type            = md5
auth_file            = /etc/pgbouncer/userlist.txt

; Transaction pooling: optimal for FastAPI sync routes — connections are
; held only for the duration of a single SQL statement, not the full request.
pool_mode            = transaction

; Allow up to 1000 app-side connections (matches max_client_conn)
max_client_conn      = 1000

; Maintain at most 50 real server connections total — enough for 1000
; concurrent users at typical 50-200ms request latencies.
default_pool_size    = 50

; Drop idle server connections after 60 s to avoid PostgreSQL exhaustion
server_idle_timeout  = 60

; Reduce noise in logs (set to 1 to debug connection counts)
log_connections      = 0
log_disconnections   = 0

; Health check — keep alive
server_check_query   = SELECT 1
server_check_delay   = 30
